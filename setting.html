<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="The purpose of Routine Fit is to provide a unified digital platform that helps users manage their daily routines and health-related habits in enjoyable and consistent way. The website addresses common issues such as lack of discipline, irregular schedules, unhealthy lifestyle habits, and mental stress. Routine Fit motivates users to maintain consistency and improve overall well-being"
    />
    <meta
      name="keywords"
      content="Routine management, Fitness, career Goal, discipline, habits, lifestyle, motivates, healthy, schedules, well-being, daily-routines"
    />
    <meta name="author" content="Tech Stack Hub" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Routine Fit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      href="assets/images/routinefit_favicon.ico"
      sizes="192x192"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/logo.png"
    />
  </head>

  <body class="signup-page d-flex flex-column min-vh-100">
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark"
      role="navigation"
      aria-label="Main navigation"
    >
      <div class="container-fluid">
        <!-- Brand -->
        <a class="navbar-brand" href="dashboard.html" tabindex="0">
          <img
            src="assets/images/logo.png"
            alt="RoutineFit Logo"
            class="logo d-inline-block align-text-top me-2"
        /></a>

        <!-- Toggle Button (Mobile) -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
          tabindex="0"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav Links -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link active" href="dashboard.html" tabindex="0"
                >Dashboard</a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="progress.html" tabindex="0">Progress</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="setting.html" tabindex="0">Settings</a>
            </li>
          </ul>

          <!-- Profile Dropdown -->
          <ul class="navbar-nav">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle d-flex align-items-center"
                href="#"
                id="profileDropdown"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                aria-haspopup="true"
                tabindex="0"
              >
                <i
                  class="bi bi-person-circle profile-icon"
                  aria-hidden="true"
                ></i>
                <span class="ms-2">Profile</span>
              </a>

              <ul
                class="dropdown-menu dropdown-menu-end"
                aria-labelledby="profileDropdown"
              >
                <li>
                  <a class="dropdown-item" href="profile.html" tabindex="0">
                    View Profile
                  </a>
                </li>

                <li>
                  <a class="dropdown-item" href="setting.html" tabindex="0">
                    Settings
                  </a>
                </li>

                <li><hr class="dropdown-divider" /></li>

                <li>
                  <a
                    class="dropdown-item text-danger"
                    href="index.html"
                    tabindex="0"
                  >
                    Logout
                  </a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="flex-fill py-4">
      <div class="container py-5">
        <h2 class="text-center mb-4">Settings</h2>

        <div class="row justify-content-center">
          <div class="col-12 col-md-6">
            <div class="card p-4">
              <form aria-label="Settings form">
                <!-- Notifications -->
                <div class="form-check form-switch mb-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="notifications"
                    tabindex="0"
                  />
                  <label class="form-check-label" for="notifications">
                    Enable Notifications
                  </label>
                </div>

                <!-- Dark Mode -->
                <div class="form-check form-switch mb-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="darkMode"
                    tabindex="0"
                  />
                  <label class="form-check-label" for="darkMode">
                    Dark Mode
                  </label>
                </div>

                <!-- Language -->
                <div class="mb-3">
                  <label class="form-label">Language</label>
                  <select class="form-select" tabindex="0">
                    <option>English</option>
                    <option>Hindi</option>
                    <option>French</option>
                  </select>
                </div>

                <button type="button" class="btn btn-primary w-100">
                  Save Settings
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-center py-3">
      <p>© 2026 RoutineFit | Smart Routine & Goal Management</p>
    </footer>
    <!-- Bootstrap JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

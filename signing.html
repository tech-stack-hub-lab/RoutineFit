<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="The purpose of Routine Fit is to provide a unified digital platform that helps users manage their daily routines and health-related habits in enjoyable and consistent way. The website addresses common issues such as lack of discipline, irregular schedules, unhealthy lifestyle habits, and mental stress. Routine Fit motivates users to maintain consistency and improve overall well-being"
    />
    <meta
      name="keywords"
      content="Routine management, Fitness, career Goal, discipline, habits, lifestyle, motivates, healthy, schedules, well-being, daily-routines"
    />
    <meta name="author" content="Tech Stack Hub" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Routine Fit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/images/routinefit_favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      href="assets/images/routinefit_favicon.ico"
      sizes="192x192"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/routinefit_favicon.ico"
    />
  </head>
  <body class="signup-page">
    <header>
      <nav class="navbar sticky-top bg-light shadow-sm">
        <div class="container-fluid px-4">
          <a class="navbar-brand fw-bold" href="index.html">
            <img
              src="assets/images/logo.png"
              alt="RoutineFit Logo"
              class="logo d-inline-block align-text-top me-2"
            />
          </a>
          <div class="ms-auto">
            <a href="signing.html" class="btn btn-outline-primary me-2">
              Get Started
            </a>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <!-- ✅ Add class ONLY here so background applies to this page -->

      <div class="overlay">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
              <div class="signup-card">
                <h3 class="text-center mb-4">Create Account</h3>

                <form aria-labelledby="form-title">
                  <!-- Full Name -->
                  <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input
                      type="text"
                      id="name"
                      class="form-control"
                      required
                      tabindex="0"
                    />
                  </div>

                  <!-- Email -->
                  <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input
                      type="email"
                      id="email"
                      class="form-control"
                      required
                      tabindex="0"
                      aria-describedby="emailHelp"
                    />
                    <div id="emailHelp" class="form-text">
                      We'll never share your email.
                    </div>
                  </div>

                  <!-- Password -->
                  <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      required
                      minlength="6"
                      tabindex="0"
                    />
                  </div>

                  <!-- Confirm Password -->
                  <div class="mb-3">
                    <label for="confirm-password" class="form-label"
                      >Confirm Password</label
                    >
                    <input
                      type="password"
                      id="confirm-password"
                      class="form-control"
                      required
                      tabindex="0"
                    />
                  </div>

                  <!-- Submit -->
                  <button
                    type="button"
                    class="btn btn-success w-100 mt-3 mb-3 signing-btn"
                    tabindex="0"
                    onclick="handleSignUp()"
                  >
                    Sign Up
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center py-3">
      <p>© 2026 RoutineFit | Smart Routine & Goal Management</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script>
      
    </script>
  </body>
</html>
